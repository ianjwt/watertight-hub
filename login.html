<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watertight Vortex</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root { --green: #116E53; --green-dark: #0d5540; --cream: #faf9f7; --border: #e2e8e5; --text: #1a2e28; --muted: #6b8a80; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Poppins', sans-serif; background: var(--cream); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { background: white; border: 1px solid var(--border); border-radius: 20px; padding: 48px 40px; width: 100%; max-width: 400px; box-shadow: 0 4px 32px rgba(17,110,83,0.1); text-align: center; }
  .logo { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 32px; }
  .logo svg { width: 36px; height: 36px; }
  .logo-text { font-size: 18px; font-weight: 700; color: var(--green); }
  h1 { font-size: 22px; font-weight: 700; color: var(--green-dark); margin-bottom: 6px; }
  .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 32px; }
  .input-wrap { position: relative; margin-bottom: 16px; }
  input[type="password"], input[type="text"] { width: 100%; padding: 13px 44px 13px 16px; border: 1.5px solid var(--border); border-radius: 12px; font-family: 'Poppins', sans-serif; font-size: 14px; color: var(--text); background: var(--cream); outline: none; transition: border-color 0.2s; letter-spacing: 0.1em; }
  input::placeholder { letter-spacing: 0; color: #aab8b2; }
  input:focus { border-color: var(--green); }
  input.error { border-color: #c0392b; }
  .toggle-pw { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--muted); background: none; border: none; padding: 0; display: flex; align-items: center; }
  .toggle-pw:hover { color: var(--green); }
  .error-msg { font-size: 12px; color: #c0392b; margin-bottom: 14px; display: none; text-align: left; }
  .error-msg.visible { display: block; }
  button.submit { width: 100%; padding: 13px; background: var(--green); color: white; border: none; border-radius: 12px; font-family: 'Poppins', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.18s; }
  button.submit:hover { background: var(--green-dark); }
  .footer { margin-top: 28px; font-size: 11px; color: var(--muted); opacity: 0.6; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M20 4C20 4 8 14 8 24C8 30.627 13.373 36 20 36C26.627 36 32 30.627 32 24C32 14 20 4 20 4Z" fill="#116E53"/>
      <path d="M20 12C20 12 13 19 13 25C13 28.866 16.134 32 20 32C23.866 32 27 28.866 27 25C27 19 20 12 20 12Z" fill="white" fill-opacity="0.3"/>
    </svg>
    <span class="logo-text">Watertight Vortex</span>
  </div>
  <h1>Welcome back</h1>
  <p class="subtitle">Enter the team password to continue.</p>
  <div class="input-wrap">
    <input type="password" id="password" placeholder="Password" autocomplete="current-password">
    <button class="toggle-pw" type="button" onclick="togglePassword()" tabindex="-1">
      <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    </button>
  </div>
  <div class="error-msg" id="errorMsg">Incorrect password. Please try again.</div>
  <button class="submit" onclick="handleLogin()">Enter Vortex</button>
  <p class="footer">Watertight &nbsp;·&nbsp; Internal use only</p>
</div>
<script>
  // The hashed password check happens entirely in the browser
  // SHA-256 hash of the correct password is stored here
  const CORRECT_HASH = 'e11e5a6e4fe1353c01c71ebdf45466d8342f35cbe34b40b375ecdc38b1c63c3a';

  // If already authenticated, go straight to the Vortex
  if (sessionStorage.getItem('wt_auth') === 'true') {
    window.location.replace('/');
  }

  const input = document.getElementById('password');
  input.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
  input.addEventListener('input', () => {
    input.classList.remove('error');
    document.getElementById('errorMsg').classList.remove('visible');
  });

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  async function handleLogin() {
    const password = input.value.trim();
    if (!password) { input.focus(); return; }
    const hash = await sha256(password);
    if (hash === CORRECT_HASH) {
      sessionStorage.setItem('wt_auth', 'true');
      window.location.replace('/');
    } else {
      input.classList.add('error');
      document.getElementById('errorMsg').classList.add('visible');
      input.value = '';
      input.focus();
    }
  }

  function togglePassword() {
    const isText = input.type === 'text';
    input.type = isText ? 'password' : 'text';
    document.getElementById('eye-icon').innerHTML = isText
      ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
      : '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  }
</script>
</body>
</html>
